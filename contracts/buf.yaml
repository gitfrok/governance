version: v2
# The contracts module is the ONLY shared cross-context surface (ADR-0022).
# Lint/breaking rules for the SoT are governance's own CI gate; T-0001 only wires codegen,
# so consumers generate from this module without redefining its policy here.
modules:
  - path: .
    name: buf.build/gitfrok/contracts
lint:
  use:
    - STANDARD
  # The existing v1 contracts encode deliberate, ADR-backed shapes (streaming AgentGateway,
  # event message names). Package-layout enforcement is deferred to the governance contract
  # gate; disabling here keeps T-0001 from rewriting Source-of-Truth protos (invariant 21).
  except:
    - PACKAGE_DIRECTORY_MATCH
    - SERVICE_SUFFIX
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
    - RPC_REQUEST_RESPONSE_UNIQUE
breaking:
  use:
    - FILE
